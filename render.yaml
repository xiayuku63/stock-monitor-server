services:
  - type: web
    name: stock-monitor-api
    runtime: node
    nodeVersion: 20
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: ./db/data.db
      - key: PORT
        value: 3000
    disk:
      name: data
      mountPath: /app/db
      sizeGB: 1
